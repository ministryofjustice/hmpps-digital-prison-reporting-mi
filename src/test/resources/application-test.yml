server:
  shutdown: immediate

spring:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/datamart
    username: test
    password: test
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: Pool-One
    # only have driver-class-name here because we dont want to intialise the missingreport stuff generally
    missingreport:
      url: jdbc:postgresql://localhost:5432/datamart
      driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          DPR_LIB_API:
            provider: hmpps-auth
            authorization-grant-type: client_credentials
            client-id: ${API_CLIENT_CREDENTIALS_ID}
            client-secret: ${API_CLIENT_CREDENTIALS_SECRET}
        provider:
          hmpps-auth:
            token-uri: ${hmpps.auth.url}/oauth/token
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps.auth.url}/.well-known/jwks.json

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

dpr:
  lib:
    caseloads:
      host: http://localhost:9999
    manage-users:
      host: http://localhost:9999
    user:
      role: ROLE_PRISONS_REPORTING_USER
    system:
      role: ROLE_PRISONS_REPORTING_USER
      token:
        enabled: false
    dataProductDefinitions:
    redshiftdataapi:
      secretarn: REDSHIFT_DATA_SECRETARN
      clusterid: REDSHIFT_DATA_CLUSTER_ID
      database: REDSHIFT_DATA_DB
      s3location: dpr-working-development/reports
      athenaworkgroup: athenaWorkgroup

hmpps:
  auth:
    url: http://localhost:9999/auth