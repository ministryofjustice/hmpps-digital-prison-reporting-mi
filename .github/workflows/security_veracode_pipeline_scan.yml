name: Security veracode pipeline scan
on:
  workflow_dispatch:
  schedule:
    - cron: "19 6 * * MON-FRI" # Every weekday

jobs:
  create-artifact:
    name: Build the artifact for veracode to scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/gradle_verify.yml@e7db1568006ed68b8238ec1ded2a6c175d6b78a6
    with:
      gradle-command: "BUILD_NUMBER=veracode ./gradlew assemble"
      upload-build-artifacts: true
      build-artifact-name: "build-results"
      upload-test-artifacts: false
      java-version: "21"
    permissions:
      contents: read
      actions: read
  security-veracode-pipeline-scan:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security veracode pipeline scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_pipeline_scan.yml@9ca13a4dd43887df0d0c024e5781d6ec49343d33
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      veracode_package_artifact_name: "build-results"
      veracode_artifact_name: "${{ github.event.repository.name }}-veracode.jar"
    secrets: inherit
    needs: create-artifact
